  <rect x="24" y="44" width="80" height="48" rx="8" fill="#2A2A3E" stroke="#4A9EE0" stroke-width="2"/>
  <!-- Eye strip -->
  <rect x="32" y="56" width="64" height="12" rx="4" fill="#1A1A2E"/>
  <!-- Eyes -->
  <circle cx="48" cy="62" r="4" fill="#4A9EE0"/>
